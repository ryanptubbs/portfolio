<script>
document.addEventListener("DOMContentLoaded", function() {
    const wrapper = document.getElementById('welcome-wrapper');
    const hasSeenDoors = sessionStorage.getItem('hasSeenDoors');

    if (hasSeenDoors) {
        // If they've seen them, delete the wrapper immediately so there's no flicker
        if (wrapper) wrapper.style.display = 'none';
        
        // Ensure the vibe switcher is visible since the doors didn't fade it in
        const switcher = document.querySelector('.vibe-switcher');
        if (switcher) switcher.style.opacity = '1';
    }
});

function openDoors() {
    const wrapper = document.getElementById('welcome-wrapper');
    if (!wrapper || wrapper.classList.contains('opened')) return;

    // Set the "flag" so they don't see it again this session
    sessionStorage.setItem('hasSeenDoors', 'true');

    window.scrollTo(0, 0);
    wrapper.classList.add('opened');
    
    const switcher = document.querySelector('.vibe-switcher');
    if(switcher) switcher.style.opacity = '1';

    setTimeout(() => {
        wrapper.style.display = 'none';
    }, 4500);
}

// --- CAROUSEL PHYSICS ---
const slider = document.querySelector('#gallery');
const inner = document.querySelector('.art-grid');

if (slider && inner) {
    let isDown = false;
    let startX;
    let scrollLeft = 0; // FIXED: Set to 0 to start on left
    let velX = 0;
    let momentX = 0;

    const friction = 0.85;

    function update() {
        const rightLimit = -(inner.scrollWidth - window.innerWidth + 200);
        const leftLimit = 100;

        if (!isDown) {
            velX *= friction;
            scrollLeft += velX;

            if (scrollLeft > leftLimit) {
                scrollLeft += (leftLimit - scrollLeft) * 0.15;
            }
            if (scrollLeft < rightLimit) {
                scrollLeft += (rightLimit - scrollLeft) * 0.15;
            }
            
            inner.style.transform = `translateX(${scrollLeft}px)`;
        }
        requestAnimationFrame(update);
    }

    slider.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - scrollLeft;
        velX = 0;
    });

    slider.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        const x = e.pageX - startX;
        scrollLeft = x;
        velX = x - momentX;
        momentX = x;
        inner.style.transform = `translateX(${scrollLeft}px)`;
    });

    slider.addEventListener('mouseup', () => { isDown = false; });
    slider.addEventListener('mouseleave', () => { isDown = false; });

    update();
}


function setVibe(vibe) {
    const root = document.documentElement;
    
    if (vibe === 'earthy') {
        // Your original grainy cream/brown
        root.style.setProperty('--bg-color', '#fdfaf5'); // Very light cream
        root.style.setProperty('--door-primary', '#5d4037');
        root.style.setProperty('--door-secondary', '#3e4a3d');
        root.style.setProperty('--text-main', '#4a3f35');
    } else if (vibe === 'midnight') {
        // "Blueprint" vibe: light dusty blue paper
        root.style.setProperty('--bg-color', '#eef2f6'); 
        root.style.setProperty('--door-primary', '#34495e');
        root.style.setProperty('--door-secondary', '#5d6d7e');
        root.style.setProperty('--text-main', '#2c3e50');
    } else if (vibe === 'neon') {
        // "Rosewater" vibe: light warm pink/peach
        root.style.setProperty('--bg-color', '#fff5f5');
        root.style.setProperty('--door-primary', '#d4a373');
        root.style.setProperty('--door-secondary', '#faedcd');
        root.style.setProperty('--text-main', '#606c38');
    }
}

</script>

<div class="vibe-switcher">
    <p>switch up da vibe:</p>
    <div class="swatches">
        <button class="swatch earthy" onclick="setVibe('earthy')"></button>
        <button class="swatch midnight" onclick="setVibe('midnight')"></button>
        <button class="swatch neon" onclick="setVibe('neon')"></button>
